<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BloodLoop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="header">
        <h1>BloodLoop</h1>
        <p>Become a Hero. Register Today.</p>
    </div>

    <div class="card">
        <h2 class="card-title">Donor Registration</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bloodGroup">Blood Group</label>
                    <select id="bloodGroup" required>
                        <option value="" disabled selected>Select Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="New York" required>
                </div>
                <div class="form-group">
                    <label for="lastDonationDate">Last Donation Date</label>
                    <input type="date" id="lastDonationDate">
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-user-plus" style="margin-right: 8px;"></i> Complete Registration
            </button>
            <div id="registerMessage" class="message"></div>
        </form>
    </div>

    <div class="nav-links">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <a href="search.html" class="nav-link"><i class="fas fa-search"></i> Search Donors</a>
        <a href="request.html" class="nav-link"><i class="fas fa-hospital-user"></i> Request Blood</a>
    </div>

    <script src="app.js"></script>
</body>

</html>
