<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - BloodLoop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="header">
        <h1>BloodLoop</h1>
        <p>Find Donors Near You.</p>
    </div>

    <div class="card">
        <h2 class="card-title">Search Donors</h2>
        <form id="searchForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="searchBloodGroup">Blood Group</label>
                    <select id="searchBloodGroup" required>
                        <option value="" disabled selected>Select Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="searchCity">City</label>
                    <input type="text" id="searchCity" placeholder="New York" required>
                </div>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-search" style="margin-right: 8px;"></i> Search Donors
            </button>
            <div id="searchMessage" class="message"></div>
        </form>

        <div id="resultsContainer" class="donor-list">
            <!-- Results will be populated here by JS -->
        </div>
    </div>

    <div class="nav-links">
        <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
        <a href="register.html" class="nav-link"><i class="fas fa-user-plus"></i> Register</a>
        <a href="request.html" class="nav-link"><i class="fas fa-hospital-user"></i> Request Blood</a>
    </div>

    <script src="app.js"></script>
</body>

</html>
